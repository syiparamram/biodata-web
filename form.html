<!DOCTYPE html>
<html>
<head>
<title>Form Biodata</title>
<style>
body{font-family:Arial;background:#f4f4f4;padding:40px;}
.container{
    width:400px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
}
h2{color:#900000;text-align:center;}
input,textarea{
    width:100%;
    margin:8px 0 15px;
    padding:8px;
}
button{
    width:100%;
    padding:10px;
    background:#900000;
    color:white;
    border:none;
}
.hasil{margin-top:15px;}
</style>
</head>
<body>

<div class="container">
<h2>Form Biodata</h2>

<form onsubmit="return hitung()">
<input type="text" id="nama" placeholder="Nama Lengkap" required>
<input type="text" id="kelas" placeholder="Kelas" required>
<textarea id="alamat" placeholder="Alamat" required></textarea>
<input type="date" id="tgl" required>
<button type="submit">Simpan</button>
</form>

<div class="hasil" id="hasil"></div>

<br>
<a href="index.html">← Kembali</a>
</div>

<script>
function hitung(){
var nama=document.getElementById("nama").value;
var kelas=document.getElementById("kelas").value;
var alamat=document.getElementById("alamat").value;
var tgl=new Date(document.getElementById("tgl").value);
var today=new Date();
var umur=today.getFullYear()-tgl.getFullYear();

document.getElementById("hasil").innerHTML=
"Nama: "+nama+"<br>"+
"Kelas: "+kelas+"<br>"+
"Alamat: "+alamat+"<br>"+
"Umur: "+umur+" tahun";

return false;
}
</script>

</body>
</html>
