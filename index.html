<!DOCTYPE html>
<html>
<head>
<title>Biodata Online</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#2b0000,#900000);
    margin:0;
    padding:40px 0;
}

.container{
    background:white;
    width:400px;
    margin:auto;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#900000;
}

input, textarea{
    width:100%;
    margin:8px 0 15px;
    padding:8px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    background:#900000;
    color:white;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#6b0000;
}

.hasil{
    margin-top:20px;
    padding:15px;
    background:#f5f5f5;
    border-left:5px solid #900000;
    border-radius:8px;
}

.screenshot-section{
    width:80%;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.screenshot-section h3{
    color:#900000;
}

.screenshot-section img{
    width:100%;
    margin:15px 0;
    border-radius:8px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>

</head>
<body>

<!-- FORM SECTION -->
<div class="container">
<h2>Form Biodata</h2>

<form onsubmit="return hitung()">
<input type="text" id="nama" placeholder="Nama Lengkap" required>
<input type="text" id="kelas" placeholder="Kelas" required>
<textarea id="alamat" placeholder="Alamat" required></textarea>
<input type="date" id="tgl" required>
<button type="submit">Simpan</button>
</form>

<div class="hasil" id="hasil"></div>
</div>

<!-- SCREENSHOT SECTION -->
<div class="screenshot-section">

<h3>Hasil Soal 1 - XAMPP</h3>
<img src="XAMPPrunning.png">
<img src="XAMPPfolder.png">
<img src="code.png">
<img src="code (2).png">
<img src="code (3).png">
<img src="code (4).png">
<img src="code (5).png">
<img src="XAMPPform.png">


<h3>Hasil Soal 2 - Laragon</h3>
<img src="laragon1.png">
<img src="laragon2.png">
<img src="laragon3.png">

</div>

<script>
function hitung(){
var nama=document.getElementById("nama").value;
var kelas=document.getElementById("kelas").value;
var alamat=document.getElementById("alamat").value;
var tgl=new Date(document.getElementById("tgl").value);
var today=new Date();
var umur=today.getFullYear()-tgl.getFullYear();

document.getElementById("hasil").innerHTML=
"<b>Hasil:</b><br><br>"+
"Nama: "+nama+"<br>"+
"Kelas: "+kelas+"<br>"+
"Alamat: "+alamat+"<br>"+
"Umur: "+umur+" tahun";

return false;
}
</script>

</body>
</html>
